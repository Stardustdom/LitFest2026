    <style>
        /* ===== GLOBAL STYLES ===== */
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', monospace;
            background: #000;
            color: #fff;
        }

        a {
            color: #ff0000;
            text-decoration: none;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            padding: 40px;
            justify-content: center;
        }

        .container {
            min-height: 100vh;
        }

        html, body {
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* ===== LEFT SECTION: EVENT INFO ===== */
        .event-info {
            flex: 1 1 400px;
            max-width: 600px;
        }

        .event-title {
            font-family: 'ITC Benguiat Std', serif;
            font-size: 2.5rem;
            color: #ff0000;
            text-shadow: 0 0 8px #b30000;
            margin-bottom: 20px;
        }

        .event-quote {
            font-style: italic;
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #ff0000;
            padding: 15px;
            margin-bottom: 20px;
        }

        .event-desc {
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .event-details {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .event-details div {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            padding: 8px 12px;
            border-radius: 6px;
        }

        .event-rules {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-left: 4px solid #ff0000;
            border-radius: 6px;
        }

        .event-rules ul {
            padding-left: 20px;
            margin: 0;
        }

        .event-rules li {
            margin-bottom: 6px;
        }

        /* ===== RIGHT SECTION: FORM ===== */
        .event-form {
            flex: 0 0 auto;
            /* ⬅ stop stretching */
            align-self: flex-start;
            /* ⬅ stay at top */
            max-width: 400px;
            border: 2px solid #ff0000;
            padding: 30px;
            border-radius: 12px;
            background: rgba(255,0,0,0.03);
            height: fit-content;
            /* ⬅ end exactly after button */
        }

        .event-form h2 {
            text-align: center;
            color: #ff0000;
            font-family: 'ITC Benguiat Std', serif;
            text-shadow: 0 0 8px #b30000;
            margin-bottom: 25px;
        }

        .event-form label {
            display: block;
            margin: 10px 0 5px;
            font-size: 0.9rem;
            text-transform: uppercase;
            color: #ff6666;
        }

        .event-form input, .event-form textarea {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid #ff0000;
            border-radius: 6px;
            color: #fff;
        }

        .event-form input:focus, .event-form textarea:focus {
            outline: none;
            border-color: #ff1a1a;
            box-shadow: 0 0 6px #ff1a1a;
        }

        .event-form button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #b30000, #ff1a1a);
            border: none;
            color: #fff;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 1px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .event-form button:hover {
            transform: scale(1.03);
            box-shadow: 0 0 15px #ff1a1a, 0 0 25px #b30000 inset;
        }

        /* ===== BACK LINK ===== */
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            display: inline-block;
        }

        .back-icon {
            width: 42px;
            /* adjust size if needed */
            height: auto;
            cursor: pointer;
            transition: transform 0.25s ease, filter 0.25s ease;
        }

        .back-icon:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 8px #ff0000);
        }

        /* ===== ASH ANIMATION CONTAINER ===== */
        .ash-container {
            position: fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            pointer-events: none;
            z-index: 1000;
        }

        .ash {
            position: absolute;
            background: rgba(200,200,200,0.3);
            width: 3px;
            height: 10px;
            border-radius: 50%;
            animation: floatAsh linear infinite;
        }

        @keyframes floatAsh {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 0.2;
            }
            50% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-800px) translateX(50px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>

                    "Style: The tournament follows a formal Oxford Style format.",
                    "Composition: Participants compete in teams of two; individual registrants will be paired by organizers.",
                    "Stance: Within each team, one member speaks FOR the motion and the other speaks AGAINST.",
                    "Speaking Time: Each participant is allotted 3 minutes for their main constructive speech.",
                    "Grace Period: A 12-second grace period (T+12) is allowed to conclude arguments.",
                    "Rebuttals: Each participant has 1 minute to respond to opposing questions from the house.",
                    "Conduct: Inflammatory language or derogatory remarks regarding identity result in point deduction or disqualification.",
                    "Floor Etiquette: Interrupting a speaker during protected time or during a rebuttal response is strictly prohibited.",
                    "Penalties: Two verbal warnings are given for etiquette violations; a third results in immediate disqualification.",
                    "Technology: Laptops and phones are allowed for live research but CANNOT be used for timing or reading notes.",
                    "Performance: Reading full speeches verbatim rather than engaging in active debate may lower 'Style' points.",
                    "Motion Release: The official debate motion is released exactly 24 hours prior to the event.",
                    "Language: This is a trilingual debate; language preferences must be fixed during registration and cannot be changed.",
                    "Scheduling: Requests to move speaking slots must be made at least 3 hours prior to the event start.",
                    "Finality: All decisions are at the sole discretion of the Judge and Chair with no appeals considered.",
                    "Authority: Organizers reserve the right to modify rules, matchups, or team compositions as they see fit."
                ]
            }
        }

        // ====== DYNAMIC EVENT INFO ======
        const params = new URLSearchParams(window.location.search);
        const eventName = params.get('event') || 'Echoes in the WSQK';
        const eventData = events[eventName] || events["Echoes in the WSQK"];

        // Auto-generate Institution ID
        document.getElementById('event-title').textContent = eventName;
        document.querySelector('.event-quote').textContent = eventData.quote;
        document.querySelector('.event-desc').textContent = eventData.desc;
        document.querySelector('.event-details').innerHTML = `
            <div><span>⏰</span> ${eventData.time}</div>
            <div><span>📍</span> ${eventData.venue}</div>
        `;

        const rulesList = document.querySelector('.event-rules ul');
        rulesList.innerHTML = '';
        eventData.rules.forEach(rule => {
            const li = document.createElement('li');
            li.textContent = rule;
            rulesList.appendChild(li);
        });

        // ====== CUSTOM CURSOR ======
        if (cursor) {
            document.addEventListener('mousemove', e => {
                cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%, -50%)`;
            });
            document.addEventListener('mousedown', () => cursor.classList.add('click'));
            document.addEventListener('mouseup', () => cursor.classList.remove('click'));
        }

        // ====== CLICK SOUND ======
        if (clickSound) {
            clickSound.volume = 0.6;
            let audioUnlocked = false;
            document.addEventListener('mousedown', () => {
                if (!audioUnlocked) {
                    clickSound.play().catch(()=>{});
                    audioUnlocked = true;
                } else {
                    clickSound.currentTime = 0;
                    clickSound.play().catch(()=>{});
                }
            });
        }

        // ====== ASH ANIMATION ======
        const totalAsh = 80;
        for (let i=0;i<totalAsh;i++){
            const ash = document.createElement('div');
            ash.classList.add('ash');
            ash.style.left = Math.random()*window.innerWidth + 'px';
            ash.style.top = Math.random()*window.innerHeight + 'px';
            ash.style.animationDuration = 5 + Math.random()*10 + 's';
            ash.style.width = 2 + Math.random()*3 + 'px';
            ash.style.height = 6 + Math.random()*10 + 'px';
            ashContainer.appendChild(ash);
        }

        // ====== FORM SUBMISSION ======
        joinForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                agent: document.getElementById('agent').value,
                eventName: eventName,
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                institutionId: document.getElementById('institutionId').value,
                college: document.getElementById('college').value,
            };

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Submission failed");

                // ✅ Browser prompt
                alert("✅ Successful enlistment! Your registration has been recorded.");
                // ✅ Reset form
                joinForm.reset();
                // Optional: clear status text
                responseMsg.textContent = '';

            } catch (err) {
                console.error('Failed to join event:', err);
                responseMsg.textContent = 'Failed: ' + (err.message || err);
                responseMsg.style.color = '#ff3333';
            }
        });

        const collegeInput = document.getElementById("college");
        const institutionIdInput = document.getElementById("institutionId");

        // Generate ID if new institution
        function generateInstitutionID() {
    return "ID-" + Math.random().toString(36).substring(2, 5).toUpperCase();
}
        

        let timer;
        collegeInput.addEventListener("input", () => {
            clearTimeout(timer);
            timer = setTimeout(async () => {
                const college = collegeInput.value.trim();
                if (!college) return;

                try {
                    const res = await fetch(
                        `/check-institution?college=${encodeURIComponent(college)}`
                    );
                    const data = await res.json();

                    if (data.exists) {
                        institutionIdInput.value = data.institutionId;
                    } else {
                        institutionIdInput.value = generateInstitutionID();
                    }
                } catch (err) {
                    console.error("Error checking institution");
                }
            }, 500);
        });
    </script>
</body>
</html>
