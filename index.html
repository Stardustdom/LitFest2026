<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risers Fest | A Literary Affair</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>

    <div id="entrance-screen">
        <h1 class="glow-text">A LITERARY AFFAIR</h1>
        <button id="enter-btn">ENTER HAWKINS</button>
    </div>

    <div id="video-container" class="hidden">
        <video id="intro-video" preload="auto">
            <source src="intro.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <div class="video-controls">

            <!-- MUTE / UNMUTE BUTTON -->
            <button id="mute-btn" class="icon-btn" aria-label="Toggle sound">
    <img src="volume-up-interface-symbol.png" class="icon unmuted" alt="Unmuted">
    <img src="mute.png" class="icon muted-icon" alt="Muted">
</button>

          

            <!-- SKIP BUTTON -->
            <button id="skip-btn">Skip Intro</button>

        </div>
    </div>

      
    
    <audio id="click-sound" preload="auto">
        <source src="click.mp3" type="audio/mpeg">
    </audio>

    <!-- SCRIPT MUST BE LAST -->
     <script>document.addEventListener("DOMContentLoaded", () => {
    const enterBtn = document.getElementById("enter-btn");
    const entranceScreen = document.getElementById("entrance-screen");
    const videoContainer = document.getElementById("video-container");
    const introVideo = document.getElementById("intro-video");
    const muteBtn = document.getElementById("mute-btn");
    const skipBtn = document.getElementById("skip-btn");
    const clickSound = document.getElementById("click-sound");

    // Swap video for mobile
    const isMobile = window.innerWidth <= 768; // adjust breakpoint as needed
    if (isMobile) {
        introVideo.src = "intromob.mp4";
    } else {
        introVideo.src = "intro.mp4";
    }

    enterBtn.addEventListener("click", () => {
        clickSound.play();
        entranceScreen.classList.add("hidden");
        videoContainer.classList.remove("hidden");
        introVideo.play();
    });

  

    // Skip button
    skipBtn.addEventListener("click", () => {
        introVideo.pause();
        videoContainer.classList.add("hidden");
        // Here you can show the main content
    });
});
</script>
    <script src="script.js"></script>
</body>
</html>
